<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- FIX #8: Content Security Policy -->
    <meta http-equiv="Content-Security-Policy"
        content="default-src 'self';
                 script-src 'self' https://www.gstatic.com https://www.googleapis.com 'unsafe-inline';
                 connect-src 'self' https://*.googleapis.com https://*.firebaseio.com https://firestore.googleapis.com https://identitytoolkit.googleapis.com;
                 img-src 'self' https: data:;
                 style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
                 font-src 'self' https://fonts.gstatic.com;">
    <title>Sintegra Store | Venta de Páginas Web</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <!-- FIX #3: Botón admin ELIMINADO del sitio público -->

    <header class="header">
        <div class="container nav-container">
            <div class="brand-container">
                <div class="logo-wrapper">
                    <img src="https://raw.githubusercontent.com/josemanueldiazocampo2-oss/imagenes/refs/heads/main/Gemini_Generated_Image_btixxkbtixxkbtix.png" alt="Sintegra Store Logo" class="logo-img">
                    <h1 class="logo">Sintegra<span>Store</span></h1>
                </div>
            </div>
            <div class="header-actions">
                <select id="categorySelect" class="category-select" onchange="filterByCategory(this.value)">
                    <option value="all">Todas las Categorías</option>
                </select>
                <button id="openCitasBtn" class="cita-btn" aria-label="Solicitar Cita">
                    <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                        <line x1="16" y1="2" x2="16" y2="6"></line>
                        <line x1="8" y1="2" x2="8" y2="6"></line>
                        <line x1="3" y1="10" x2="21" y2="10"></line>
                    </svg>
                    <span id="citaCount" class="cita-count" style="display:none;">0</span>
                </button>
            </div>
        </div>
    </header>

    <main class="container" style="margin-top: 2rem;">
        <div id="websGrid" class="products-grid">
            <p style="text-align: center; color: var(--text-muted); grid-column: 1/-1;">Cargando webs...</p>
        </div>
    </main>

    <!-- SECCIÓN VISIÓN Y MISIÓN -->
    <section class="vision-mission-section">
        <h2 class="vision-mission-title">Nuestra Esencia</h2>
        <div class="vision-mission-grid">
            <div class="vision-mission-card mission">
                <div class="vision-mission-header">
                    <div class="vision-mission-icon">🎯</div>
                    <h3>Misión</h3>
                </div>
                <div class="vision-mission-content" id="missionContent">
                    <span class="vision-mission-placeholder">Cargando misión...</span>
                </div>
            </div>
            <div class="vision-mission-card vision">
                <div class="vision-mission-header">
                    <div class="vision-mission-icon">👁️</div>
                    <h3>Visión</h3>
                </div>
                <div class="vision-mission-content" id="visionContent">
                    <span class="vision-mission-placeholder">Cargando visión...</span>
                </div>
            </div>
        </div>
    </section>

    <!-- Modal: Vista de Web -->
    <div id="webModal" class="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
        <div class="modal-content">
            <button class="close-modal" onclick="closeModal('webModal')" aria-label="Cerrar">&times;</button>
            <div class="modal-img">
                <img id="modalImage" src="" alt="">
            </div>
            <div class="modal-details">
                <span id="modalCategory" class="card-category"></span>
                <h2 id="modalTitle"></h2>
                <p id="modalDescription" class="modal-desc"></p>
                <a id="viewWebBtn" href="#" target="_blank" rel="noopener noreferrer" class="btn" style="width: 100%; margin-top: 1rem;">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 8px;">
                        <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path>
                        <polyline points="15 3 21 3 21 9"></polyline>
                        <line x1="10" y1="14" x2="21" y2="3"></line>
                    </svg>
                    Ver Web
                </a>
            </div>
        </div>
    </div>

    <!-- Modal: Solicitar Cita -->
    <div id="citaModal" class="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="citaModalTitle">
        <div class="modal-content" style="max-width: 450px; flex-direction: column;">
            <button class="close-modal" onclick="closeModal('citaModal')" aria-label="Cerrar">&times;</button>
            <h2 id="citaModalTitle" style="margin-top:0;">📅 Solicitar Cita</h2>
            <p style="color: var(--text-muted); margin-bottom: 1rem;">Agenda una cita para que podamos asesorarte sobre tu proyecto web.</p>
            <form id="citaForm" novalidate>
                <div class="form-group">
                    <input type="text" id="cName" placeholder="Nombre Completo" required maxlength="100" autocomplete="name">
                </div>
                <div class="form-group">
                    <input type="tel" id="cContact" placeholder="Teléfono / WhatsApp" required maxlength="20" autocomplete="tel">
                </div>
                <div class="form-group">
                    <input type="email" id="cEmail" placeholder="Correo Electrónico" required maxlength="100" autocomplete="email">
                </div>
                <div class="form-group">
                    <input type="date" id="cDate" required>
                </div>
                <div class="form-group">
                    <select id="cTime" required>
                        <option value="">Selecciona una hora</option>
                        <option value="09:00">09:00 AM</option>
                        <option value="10:00">10:00 AM</option>
                        <option value="11:00">11:00 AM</option>
                        <option value="12:00">12:00 PM</option>
                        <option value="14:00">02:00 PM</option>
                        <option value="15:00">03:00 PM</option>
                        <option value="16:00">04:00 PM</option>
                        <option value="17:00">05:00 PM</option>
                    </select>
                </div>
                <div class="form-group">
                    <!-- FIX #6: maxlength limita tamaño del mensaje -->
                    <textarea id="cMessage" placeholder="Cuéntanos sobre tu proyecto..." rows="3" maxlength="500"></textarea>
                </div>
                <button type="submit" class="btn" style="width: 100%;">✅ Solicitar Cita</button>
            </form>
        </div>
    </div>

    <script type="module" src="script.js"></script>

    <!-- FOOTER -->
    <footer class="footer">
        <div class="footer-content">
            <p class="footer-text">
                <span>©</span>
                <span class="footer-year" id="footerYear">2025</span>
                <span class="footer-divider">|</span>
                <span>Todos los derechos reservados a</span>
                <span class="footer-logo">Sintegra</span>
            </p>
        </div>
    </footer>

</body>
</html>
